<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Note</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #191919;
        color: #e3e3e3;
      }

      .container {
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .titlebar {
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 8px 0 10px;
        border-bottom: 1px solid #2f2f2f;
        -webkit-app-region: drag;
      }

      .title {
        font-size: 12px;
        color: #b5b5b5;
      }

      .close-btn {
        width: 24px;
        height: 24px;
        border: 0;
        background: transparent;
        color: #9b9b9b;
        border-radius: 6px;
        cursor: pointer;
        -webkit-app-region: no-drag;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .close-btn:hover {
        background: #353535;
        color: #e3e3e3;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      textarea {
        flex: 1;
        width: 100%;
        border: 0;
        outline: none;
        resize: none;
        background: transparent;
        color: #e3e3e3;
        font-size: 16px;
        font-family: inherit;
        font-weight: 400;
        line-height: 1.5;
        padding: 16px;
      }

      textarea::placeholder {
        color: #4a4a4a;
      }

    </style>
  </head>
  <body>
    <div class="container">
      <div class="titlebar">
        <div class="title">Quick Note</div>
        <div class="actions">
          <button id="archiveBtn" class="close-btn" aria-label="Archive" title="Archive">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 8h14"/>
              <path d="M5 8a2 2 0 1 1 0-4h14a2 2 0 1 1 0 4"/>
              <path d="M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/>
              <path d="M10 12h4"/>
            </svg>
          </button>
          <button id="saveBtn" class="close-btn" aria-label="Save" title="Save">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </button>
        </div>
      </div>
      <textarea id="quickInput" placeholder="Start typing…" spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off"></textarea>
    </div>

    <script src="./quick-note.js"></script>
  </body>
</html>
