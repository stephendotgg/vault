<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Note</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #191919;
        color: #e3e3e3;
      }

      .container {
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .titlebar {
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 8px 0 10px;
        border-bottom: 1px solid #2f2f2f;
        -webkit-app-region: drag;
      }

      .title {
        font-size: 12px;
        color: #b5b5b5;
      }

      .close-btn {
        width: 22px;
        height: 22px;
        border: 0;
        background: transparent;
        color: #9b9b9b;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        -webkit-app-region: no-drag;
      }

      .close-btn:hover {
        background: #353535;
        color: #e3e3e3;
      }

      textarea {
        flex: 1;
        width: 100%;
        border: 0;
        outline: none;
        resize: none;
        background: transparent;
        color: #e3e3e3;
        font-size: 16px;
        font-family: inherit;
        font-weight: 400;
        line-height: 1.5;
        padding: 16px;
      }

      textarea::placeholder {
        color: #4a4a4a;
      }

    </style>
  </head>
  <body>
    <div class="container">
      <div class="titlebar">
        <div class="title">Quick Note</div>
        <button id="closeBtn" class="close-btn" aria-label="Close">✕</button>
      </div>
      <textarea id="quickInput" placeholder="Start typing…" spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off"></textarea>
    </div>

    <script src="./quick-note.js"></script>
  </body>
</html>
